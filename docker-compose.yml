# =============================================================================
# ScholarVerify — multi-container stack (Step 2)
#
# Services:
#   db            MongoDB (local dev / demo database)
#   fastapi-ai    Python ML API (proposal + code similarity)
#   node-backend  Node.js orchestration API + Docker preview sandbox control
#
# Start:  docker compose up --build
# Stop:   docker compose down
#
# NOTE: Student preview sandboxes are created on the HOST Docker daemon via the
#       socket mount below — not inside the node-backend container filesystem.
# =============================================================================

name: scholarverify

services:
  # ---------------------------------------------------------------------------
  # Frontend — Vite production preview
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        # Browser requests need the public backend URL, not the internal Docker DNS name.
        VITE_API_URL: ${FRONTEND_API_URL:-http://localhost:5000}
    container_name: scholarverify-frontend
    restart: unless-stopped
    depends_on:
      node-backend:
        condition: service_started
    environment:
      # Public backend URL seen by the browser, e.g. https://api.yourdomain.com
      # Leave empty only if your reverse proxy serves /api on the same host as the frontend.
      PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    ports:
      - "4173:4173"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4173"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # MongoDB — primary application database
  # ---------------------------------------------------------------------------
  db:
    image: mongo:latest
    container_name: scholarverify-db
    restart: unless-stopped
    
    environment:
      TZ: UTC
      MONGO_INITDB_DATABASE: academic_verification
      MONGO_INITDB_ROOT_USERNAME: dbadmin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  # ---------------------------------------------------------------------------
  # FastAPI AI — internal hostname: fastapi-ai (port 8000 inside the network)
  # ---------------------------------------------------------------------------
  fastapi-ai:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    container_name: scholarverify-fastapi-ai
    restart: unless-stopped
    # Do not bind FastAPI to the host. Node-backend talks to it via the compose
    # network (AI_SERVICE_URL=http://fastapi-ai:8000). Binding to host port
    # often conflicts on VPS when deploying multiple apps.
    expose:
      - "8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      APP_NAME: Academic Verification AI Service
      DATA_DIR: /app/data
      MODELS_CACHE_DIR: /app/data/models-cache
    volumes:
      # SBERT weights + SQLite embedding/job stores survive container rebuilds
      - ai_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  # ---------------------------------------------------------------------------
  # Node.js API — preview orchestration requires host Docker socket access
  # ---------------------------------------------------------------------------
  node-backend:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: scholarverify-node-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      fastapi-ai:
        condition: service_healthy
    env_file:
      # Use a normal tracked file inside backend-node for deployment reliability.
      # Some platforms treat the project-root hidden `.env` specially or do not
      # include it in the final compose project directory.
      - ./backend-node/runtime.env
    environment:
      NODE_ENV: production
      PORT: 5000
      TZ: UTC

      # Database (service name `db` resolves on the compose network)
      MONGO_URI: mongodb://dbadmin:${MONGO_ROOT_PASSWORD}@db:27017/academic_verification?authSource=admin
      MONGODB_URI: mongodb://dbadmin:${MONGO_ROOT_PASSWORD}@db:27017/academic_verification?authSource=admin

      # AI service — use Docker DNS hostname, NOT localhost
      AI_SERVICE_URL: http://fastapi-ai:8000
      AI_SERVICE_TIMEOUT_MS: ${AI_SERVICE_TIMEOUT_MS:-120000}

      # Uploads + preview cache (must match volume mounts below)
      UPLOAD_DIR: /app/uploads
      PREVIEW_CACHE_ROOT: /app/data/preview-cache

      # Auth / CORS
      # JWT secrets come from `env_file: .env`. Do not re-declare them here with
      # ${VAR} interpolation, because platforms like Coolify may substitute empty
      # strings at deploy time and override the valid values from env_file.
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}

      # Password reset email (set in .env / runtime.env for production)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      APP_NAME: ${APP_NAME:-Project Verify}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      AUTH_RETURN_RESET_TOKEN: ${AUTH_RETURN_RESET_TOKEN:-false}

      # Student project ZIP upload limit (default 250 MB)
      MAX_PROJECT_ZIP_BYTES: ${MAX_PROJECT_ZIP_BYTES:-262144000}
      MAX_PROJECT_SCREENSHOT_BYTES: ${MAX_PROJECT_SCREENSHOT_BYTES:-5242880}
      PREVIEW_MAX_EXTRACT_FILES: ${PREVIEW_MAX_EXTRACT_FILES:-5000}
      PREVIEW_MAX_EXTRACT_BYTES: ${PREVIEW_MAX_EXTRACT_BYTES:-524288000}

      # Docker preview sandbox (host daemon via socket mount)
      DOCKER_PREVIEW_ENABLED: ${DOCKER_PREVIEW_ENABLED:-true}
      DOCKER_SOCKET: /var/run/docker.sock
      PREVIEW_PUBLIC_HOST: ${PREVIEW_PUBLIC_HOST:-http://localhost}
      PREVIEW_PROBE_HOST: ${PREVIEW_PROBE_HOST:-host.docker.internal}
      PREVIEW_PORT_MIN: ${PREVIEW_PORT_MIN:-8000}
      PREVIEW_PORT_MAX: ${PREVIEW_PORT_MAX:-9000}
      PREVIEW_WORKSPACE_CACHE: ${PREVIEW_WORKSPACE_CACHE:-true}
      PREVIEW_DEPENDENCY_CACHE: ${PREVIEW_DEPENDENCY_CACHE:-true}
      PREVIEW_SIDECAR_MONGO: ${PREVIEW_SIDECAR_MONGO:-true}
      PREVIEW_SIDECAR_MYSQL: ${PREVIEW_SIDECAR_MYSQL:-true}

      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      # CRITICAL: allows node-backend to build/run/stop student preview containers on the host
      - /var/run/docker.sock:/var/run/docker.sock

      # Mount the same runtime env file so startup can still load it directly
      # via dotenv if platform env injection behaves differently than expected.
      - ./backend-node/runtime.env:/app/.env:ro

      # Student uploads — host path must be visible to host Docker when bind-mounting student ZIPs
      - ./uploads:/app/uploads

      # Preview workspace + Maven/npm caches
      - ./data:/app/data

    # Linux VPS: PREVIEW_PROBE_HOST defaults to host.docker.internal (works on Docker Desktop only)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Optional: run as non-root if your host docker.sock group id is passed in
    # group_add:
    #   - "${DOCKER_GID:-999}"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  mongo_data:
  ai_data:
